version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kwadwo
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nlpdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://kwadwo:password123@db/nlpdb
    depends_on:
      - db

volumes:
  postgres_data: